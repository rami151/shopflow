# ── APP ─────────────────────────────────────────────
spring.application.name=shopflow
server.port=8080

# ── DATABASE — PostgreSQL installed locally ──────────
spring.datasource.url=jdbc:postgresql://localhost:5432/shopflow
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / HIBERNATE ─────────────────────────────────
# update = creates tables if missing, updates columns if changed
# never use create or create-drop on a real DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── H2 CONSOLE (useful while testing entities) ───────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ─────────────────────────────────────────────
# secret must be at least 256 bits (64 hex chars) for HS256
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# access token: 15 minutes in milliseconds
jwt.expiration.access=900000
# refresh token: 7 days in milliseconds
jwt.expiration.refresh=604800000

# ── SWAGGER UI ───────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ── LOGGING ─────────────────────────────────────────
logging.level.com.shopflow=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
